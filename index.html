<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Web projects by Clark Hayashi." />
    <meta name="theme-color" content="#071d30" />
    <title>My Websites | Clark Hayashi</title>
    <style>
      :root {
        --paper: #f3eee3;
        --ink: #10283c;
        --navy: #071d30;
        --red: #b95443;
        --line: rgba(16, 40, 60, 0.22);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--paper);
        color: var(--ink);
        font-family: Arial, sans-serif;
      }
      header {
        padding: 34px clamp(24px, 7vw, 100px);
        background: var(--navy);
        color: #f6efe3;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }
      header strong { font-family: Georgia, serif; font-size: 1.55rem; font-weight: 500; }
      header span { color: #cfc7b9; font-size: 0.85rem; }
      main { max-width: 1180px; margin: 0 auto; padding: clamp(70px, 10vw, 130px) 24px; }
      h1 {
        max-width: 820px;
        margin: 0;
        font-family: Georgia, serif;
        font-size: clamp(3.4rem, 8vw, 7rem);
        font-weight: 500;
        letter-spacing: -0.055em;
        line-height: 0.94;
      }
      .intro { max-width: 600px; margin: 34px 0 80px; font-size: 1.15rem; line-height: 1.65; }
      .projects { border-top: 1px solid var(--ink); }
      .project {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 30px;
        padding: 34px 0;
        border-bottom: 1px solid var(--line);
        color: inherit;
        text-decoration: none;
      }
      .project:hover h2, .project:focus-visible h2 { color: var(--red); }
      h2 { margin: 0 0 10px; font-family: Georgia, serif; font-size: 2rem; font-weight: 500; }
      .project p { max-width: 650px; margin: 0; line-height: 1.6; }
      .project span { align-self: center; font-size: 1.8rem; }
      :focus-visible { outline: 3px solid var(--red); outline-offset: 6px; }
      @media (max-width: 620px) {
        header { align-items: flex-start; flex-direction: column; }
        .project { grid-template-columns: 1fr; }
        .project span { display: none; }
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Clark Hayashi</strong>
      <span>Independent web projects</span>
    </header>
    <main>
      <h1>My websites.</h1>
      <p class="intro">
        Small, useful sites built around things I am actually working on,
        learning, or thinking about.
      </p>
      <section class="projects" aria-label="Websites">
        <a class="project" href="clark-reading-notes/">
          <div>
            <h2>Clark’s Reading Notes</h2>
            <p>Books I read and what I actually got from them.</p>
          </div>
          <span aria-hidden="true">↗</span>
        </a>
      </section>
    </main>
  </body>
</html>
